name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

# Never run two releases for the same ref at once, and never cancel an
# in-progress publish (a half-finished publish should always complete).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run prepublishOnly

      # No NODE_AUTH_TOKEN: auth is via OIDC trusted publishing.
      # Requires a Trusted Publisher configured on npmjs.com for this repo + workflow filename.
      - name: Publish (OIDC trusted publishing)
        run: npm publish --access public --provenance
